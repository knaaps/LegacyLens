{% extends "base.html" %}

{% block title %}Risk Heatmap - LegacyLens{% endblock %}
{% block nav_heatmap %}active{% endblock %}

{% block extra_head %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
    .heatmap-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--bg-glass);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-top: 24px;
    }

    .legend-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border-light);
        width: 100%;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-secondary);
    }
    
    .legend-color {
        width: 16px;
        height: 16px;
        border-radius: 4px;
    }

    #heatmap-svg {
        max-width: 100%;
        height: auto;
    }

    .node:hover rect {
        stroke: var(--accent-primary);
        stroke-width: 2px;
        filter: brightness(1.2);
    }

    .tooltip {
        position: absolute;
        text-align: left;
        padding: 12px 16px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        background: rgba(15, 23, 42, 0.95);
        color: #fff;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-md);
        pointer-events: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
        max-width: 300px;
    }

    .tt-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--accent-primary);
        word-break: break-all;
    }
    .tt-prop { margin-bottom: 4px; color: var(--text-secondary); }
    .tt-val { color: #fff; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

    .chart-controls {
        display: flex;
        gap: 12px;
        width: 100%;
        justify-content: flex-end;
        margin-bottom: 16px;
    }

    .chart-btn {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-light);
        color: var(--text-secondary);
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .chart-btn:hover, .chart-btn.active {
        background: rgba(99,102,241,0.1);
        color: var(--accent-primary);
        border-color: var(--accent-primary);
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-tertiary);
        width: 100%;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Risk Heatmap (Treemap)</h1>
        <p style="color: var(--text-secondary); margin-top: 8px; font-size: 15px;">Visualize functions sized by cognitive energy and colored by safety risk.</p>
    </div>
</div>

<div class="heatmap-container" id="chart-container">
    <div class="chart-controls">
        <button class="chart-btn active" onclick="updateColorScale('safety')">Color by Risk</button>
        <button class="chart-btn" onclick="updateColorScale('debt')">Color by Debt</button>
    </div>
    
    <div id="tooltip" class="tooltip"></div>
    <div id="heatmap-wrap" style="width: 100%; overflow-x: auto;">
        <!-- D3 appends SVG here -->
    </div>

    <div class="legend-container" id="legend-container">
        <!-- Legend injected by JS based on mode -->
    </div>
</div>

<script>
    let heatmapData = null;
    let currentColorMode = 'safety';

    document.addEventListener('DOMContentLoaded', async () => {
        const { api, $ } = window.LegacyLens;
        $('app-root').style.display = 'block';

        try {
            // Build hierarchy from /api/scatter (flat list with file/energy/debt/safety)
            const flat = await api('/api/scatter');
            if (!flat || flat.length === 0) throw new Error('No function data found.');

            // Group by top-level directory
            const groups = {};
            flat.forEach(f => {
                const parts = (f.file || 'unknown').split('/');
                const group = parts.length > 2 ? parts[parts.length - 2] : (parts[parts.length - 1] || 'root');
                if (!groups[group]) groups[group] = [];
                groups[group].push({ name: f.name, energy: f.energy, debt: f.debt, safety: f.safety });
            });

            heatmapData = {
                name: 'root',
                children: Object.entries(groups).map(([k, v]) => ({ name: k, children: v }))
            };
            drawTreemap();
        } catch (err) {
            document.getElementById('chart-container').innerHTML = `
                <div class="empty-state">
                    <p style="color: var(--danger)">Failed to load data: ${err.message}</p>
                </div>`;
        } finally {
            $('loading').style.display = 'none';
        }
    });

    function updateColorScale(mode) {
        currentColorMode = mode;
        document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        drawTreemap();
    }

    function drawTreemap() {
        if (!heatmapData || !heatmapData.children || heatmapData.children.length === 0) {
            document.getElementById('heatmap-wrap').innerHTML = '<div class="empty-state">No data available for heatmap visualization.</div>';
            return;
        }

        const width = document.getElementById('heatmap-wrap').clientWidth || 900;
        const height = 600;

        document.getElementById('heatmap-wrap').innerHTML = '';

        const svg = d3.select("#heatmap-wrap")
            .append("svg")
            .attr("id", "heatmap-svg")
            .attr("width", width)
            .attr("height", height)
            .style("font-family", "'Inter', sans-serif");

        const tooltip = d3.select("#tooltip");

        const root = d3.hierarchy(heatmapData)
            .sum(d => d.energy || 1)
            .sort((a, b) => b.value - a.value);

        d3.treemap()
            .size([width, height])
            .paddingTop(24)
            .paddingRight(2)
            .paddingBottom(2)
            .paddingLeft(2)
            .paddingInner(1)
            (root);

        const colors = { good: '#10b981', warning: '#f59e0b', critical: '#ef4444' };

        function getColor(d) {
            if (d.depth === 0) return "rgba(0,0,0,0)";
            if (d.children) return "rgba(255,255,255,0.03)";
            const val = currentColorMode === 'safety' ? (d.data.safety || 0) : (d.data.debt || 0);
            if (val >= 7) return colors.critical;
            if (val >= 4) return colors.warning;
            return colors.good;
        }

        const cell = svg.selectAll("g")
            .data(root.descendants())
            .join("g")
            .attr("transform", d => `translate(${d.x0},${d.y0})`)
            .attr("class", d => d.children ? "node folder" : "node leaf")
            .style("cursor", d => d.children ? "default" : "pointer")
            .on("mouseover", function(event, d) {
                if (d.children) return;
                tooltip.transition().duration(200).style("opacity", 1);
                tooltip.html(`
                    <div class="tt-title">${d.data.name}</div>
                    <div class="tt-prop">Energy: <span class="tt-val">${(d.data.energy||0).toFixed(1)}</span></div>
                    <div class="tt-prop">Safety: <span class="tt-val">${(d.data.safety||0).toFixed(1)}</span></div>
                    <div class="tt-prop">Debt: <span class="tt-val">${(d.data.debt||0).toFixed(1)}</span></div>
                    <div style="margin-top:8px; font-size:11px; color:var(--accent-primary)">Click to see full details</div>
                `)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 28) + "px");
            })
            .on("mousemove", function(event) {
                tooltip.style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", function() {
                tooltip.transition().duration(500).style("opacity", 0);
            })
            .on("click", function(event, d) {
                if (!d.children && d.data.name) window.LegacyLens.openExplainModal(d.data.name);
            });

        cell.append("rect")
            .attr("width", d => Math.max(0, d.x1 - d.x0))
            .attr("height", d => Math.max(0, d.y1 - d.y0))
            .attr("fill", d => getColor(d))
            .attr("fill-opacity", d => d.children ? 1 : 0.8)
            .attr("stroke", "rgba(255,255,255,0.1)")
            .attr("stroke-width", 1);

        cell.filter(d => d.children && d.depth > 0)
            .append("text")
            .attr("x", 4).attr("y", 16)
            .text(d => d.data.name)
            .attr("font-size", "12px").attr("font-weight", "600")
            .attr("fill", "var(--text-secondary)");

        cell.filter(d => !d.children && (d.x1 - d.x0) > 40 && (d.y1 - d.y0) > 20)
            .append("text")
            .attr("x", 4).attr("y", 16)
            .text(d => d.data.name.split('.').pop())
            .attr("font-size", "10px")
            .attr("font-family", "'JetBrains Mono', monospace")
            .attr("fill", "#fff");

        const labelStr = currentColorMode === 'safety' ? 'Risk' : 'Debt';
        document.getElementById('legend-container').innerHTML = `
            <div class="legend-item"><div class="legend-color" style="background:${colors.critical}"></div> High ${labelStr} (7-10)</div>
            <div class="legend-item"><div class="legend-color" style="background:${colors.warning}"></div> Med ${labelStr} (4-6)</div>
            <div class="legend-item"><div class="legend-color" style="background:${colors.good}"></div> Low ${labelStr} (0-3)</div>
        `;
    }

    window.addEventListener('resize', () => {
        if (heatmapData) {
            clearTimeout(window._resizeTimer);
            window._resizeTimer = setTimeout(drawTreemap, 250);
        }
    });

    });
</script>
{% endblock %}
