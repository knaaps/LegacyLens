<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LegacyLens{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        /* ── reset & tokens ──────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f1a;
            --surface: #181825;
            --surface2: #1e1e2e;
            --border: #313244;
            --accent: #7c6af7;
            --accent2: #56d4a0;
            --danger: #f87171;
            --warn: #fbbf24;
            --safe: #34d399;
            --text: #cdd6f4;
            --text-dim: #6c7086;
            --radius: 10px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ── top navigation ─────────────────────────────── */
        .top-nav {
            display: flex;
            align-items: center;
            padding: 0 28px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 18px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .top-nav .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -.3px;
        }

        .top-nav .logo span {
            color: var(--text);
        }

        .top-nav .badge {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 20px;
            padding: 3px 10px;
            letter-spacing: .5px;
        }

        /* ── nav links ─────────────────────────────────── */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 12px;
        }

        .nav-links a {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 6px;
            transition: all .15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
            background: var(--surface2);
            text-decoration: none;
        }

        .nav-links a.active {
            color: var(--accent);
            background: rgba(124, 106, 247, .1);
        }

        /* ── global search ─────────────────────────────── */
        .search-wrapper {
            position: relative;
            margin-left: auto;
            flex: 0 1 340px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 8px 14px 8px 34px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color .15s;
        }

        .search-wrapper input::placeholder {
            color: var(--text-dim);
        }

        .search-wrapper input:focus {
            border-color: var(--accent);
        }

        .search-wrapper .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
        }

        /* ── autocomplete dropdown ─────────────────────── */
        .search-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
            z-index: 200;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }

        .search-dropdown.visible {
            display: block;
        }

        .search-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: background .1s;
            border-bottom: 1px solid var(--border);
        }

        .search-result:last-child {
            border-bottom: none;
        }

        .search-result:hover,
        .search-result.highlighted {
            background: var(--surface2);
        }

        .search-result .sr-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
        }

        .search-result .sr-file {
            font-size: 11px;
            color: var(--text-dim);
            margin-left: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        /* ── header meta ───────────────────────────────── */
        .nav-meta {
            font-size: 12px;
            color: var(--text-dim);
            text-align: right;
            flex-shrink: 0;
        }

        .nav-meta strong {
            color: var(--text);
        }

        /* ── page container ─────────────────────────────── */
        .page-container {
            flex: 1;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        /* ── modal overlay ──────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 90%;
            max-width: 720px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            transition: color .15s;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .modal-file {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 18px;
        }

        .modal-scores {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .modal-score-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .modal-score-card .msc-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .modal-score-card .msc-value {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-section {
            margin-bottom: 16px;
        }

        .modal-section-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-section-title .chevron {
            transition: transform .15s;
            font-size: 10px;
        }

        .modal-section-title .chevron.collapsed {
            transform: rotate(-90deg);
        }

        .modal-section-body {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
            padding-left: 4px;
        }

        .modal-section-body.collapsed {
            display: none;
        }

        /* ── score pills ───────────────────────────────── */
        .score-pill {
            display: inline-block;
            font-weight: 700;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .pill-red {
            background: rgba(248, 113, 113, .15);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, .3);
        }

        .pill-yellow {
            background: rgba(251, 191, 36, .12);
            color: var(--warn);
            border: 1px solid rgba(251, 191, 36, .3);
        }

        .pill-green {
            background: rgba(52, 211, 153, .12);
            color: var(--safe);
            border: 1px solid rgba(52, 211, 153, .3);
        }

        /* ── critique badges ───────────────────────────── */
        .badge-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .critique-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface2);
        }

        .critique-badge .cb-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* ── loading overlay ─────────────────────────────── */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 999;
        }

        #loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        #loading p {
            color: var(--text-dim);
            font-size: 13px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── error banner ────────────────────────────────── */
        #error-banner {
            display: none;
            background: #2d1230;
            border: 1px solid var(--danger);
            border-radius: var(--radius);
            padding: 16px 20px;
            color: var(--danger);
            font-size: 13px;
        }

        /* ── footer ──────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 14px;
            font-size: 11px;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading codebase analysis…</p>
    </div>

    <div id="app-root" style="display:none; min-height:100vh; display:none; flex-direction:column;">
        <!-- ── Top Navigation ──────────────────────────── -->
        <nav class="top-nav">
            <div class="brand">
                <span class="logo">Legacy<span>Lens</span></span>
                <span class="badge">Health Dashboard</span>
            </div>
            <div class="nav-links">
                <a href="/" id="nav-dashboard" class="{% block nav_dashboard %}{% endblock %}">📊 Dashboard</a>
                <a href="/functions" id="nav-functions" class="{% block nav_functions %}{% endblock %}">📋 Functions</a>
                <a href="/heatmap" id="nav-heatmap" class="{% block nav_heatmap %}{% endblock %}">🔥 Heatmap</a>
            </div>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="global-search" placeholder="Search functions, files…" autocomplete="off" />
                <div class="search-dropdown" id="search-dropdown"></div>
            </div>
            <div class="nav-meta">
                <div id="nav-repo-label" style="margin-bottom:2px">Loading…</div>
                <div id="nav-analysis-date"></div>
            </div>
        </nav>

        <!-- ── Page content ────────────────────────────── -->
        <main class="page-container">
            <div id="error-banner"></div>
            {% block content %}{% endblock %}
        </main>

        <footer>LegacyLens · AI-powered legacy code analysis · <span id="footer-date"></span></footer>
    </div>

    <!-- ── Explanation Modal ───────────────────────────── -->
    <div class="modal-overlay" id="explain-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <div class="modal-title" id="modal-func-name"></div>
            <div class="modal-file" id="modal-func-file"></div>
            <div class="modal-scores" id="modal-scores"></div>
            <div class="badge-row" id="modal-badges"></div>
            <div id="modal-sections"></div>
        </div>
    </div>

    <!-- ── Global scripts ──────────────────────────────── -->
    <script>
        // ── helpers ────────────────────────────────────────
        const $ = id => document.getElementById(id);
        async function api(path) {
            const r = await fetch(path);
            if (!r.ok) throw new Error(await r.text());
            return r.json();
        }
        function pillColor(v) {
            return v >= 7 ? 'pill-red' : v >= 4 ? 'pill-yellow' : 'pill-green';
        }
        function scoreColor(v) {
            return v >= 7 ? 'var(--danger)' : v >= 4 ? 'var(--warn)' : 'var(--safe)';
        }

        // ── Search autocomplete ───────────────────────────
        let allFunctions = [];
        let searchHighlightIdx = -1;

        async function loadAllFunctions() {
            try { allFunctions = await api('/api/functions'); } catch { allFunctions = []; }
        }

        function renderSearchResults(query) {
            const dd = $('search-dropdown');
            if (!query || query.length < 2) { dd.classList.remove('visible'); return; }
            const q = query.toLowerCase();
            const matches = allFunctions.filter(f =>
                (f.name || '').toLowerCase().includes(q) ||
                (f.file || '').toLowerCase().includes(q)
            ).slice(0, 10);
            if (!matches.length) { dd.classList.remove('visible'); return; }
            dd.innerHTML = matches.map((f, i) => {
                const fname = (f.name || '').split('.').pop();
                const ffile = (f.file || '').split('/').slice(-2).join('/');
                return `<div class="search-result" data-idx="${i}"
                     data-name="${f.name}" data-file="${f.file}">
                    <span class="sr-name">${fname}</span>
                    <span class="sr-file">…/${ffile}</span>
                </div>`;
            }).join('');
            dd.classList.add('visible');
            searchHighlightIdx = -1;
        }

        $('global-search').addEventListener('input', e => renderSearchResults(e.target.value));
        $('global-search').addEventListener('keydown', e => {
            const dd = $('search-dropdown');
            const items = dd.querySelectorAll('.search-result');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                searchHighlightIdx = Math.min(searchHighlightIdx + 1, items.length - 1);
                items.forEach((it, i) => it.classList.toggle('highlighted', i === searchHighlightIdx));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                searchHighlightIdx = Math.max(searchHighlightIdx - 1, 0);
                items.forEach((it, i) => it.classList.toggle('highlighted', i === searchHighlightIdx));
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (searchHighlightIdx >= 0 && items[searchHighlightIdx]) {
                    items[searchHighlightIdx].click();
                } else if (e.target.value) {
                    window.location.href = '/search?q=' + encodeURIComponent(e.target.value);
                }
            } else if (e.key === 'Escape') {
                dd.classList.remove('visible');
            }
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrapper')) $('search-dropdown').classList.remove('visible');
        });

        $('search-dropdown').addEventListener('click', e => {
            const item = e.target.closest('.search-result');
            if (!item) return;
            const name = item.dataset.name;
            openExplainModal(name);
            $('search-dropdown').classList.remove('visible');
            $('global-search').value = '';
        });

        // ── Explain modal ─────────────────────────────────
        async function openExplainModal(funcName) {
            const fn = allFunctions.find(f => f.name === funcName);
            if (!fn) return;
            const modal = $('explain-modal');
            $('modal-func-name').textContent = fn.name;
            $('modal-func-file').textContent = fn.file || '';

            // Scores
            const e = fn.energy ?? 0, d = fn.debt ?? 0, s = fn.safety ?? 0;
            $('modal-scores').innerHTML = `
                <div class="modal-score-card"><div class="msc-label">⚡ Energy</div>
                    <div class="msc-value" style="color:${scoreColor(e)}">${e}/10</div></div>
                <div class="modal-score-card"><div class="msc-label">🔧 Debt</div>
                    <div class="msc-value" style="color:${scoreColor(d)}">${d}/10</div></div>
                <div class="modal-score-card"><div class="msc-label">🛡 Safety</div>
                    <div class="msc-value" style="color:${scoreColor(s)}">${s}/10</div></div>`;

            // Critique badges
            const crit = fn.critique || {};
            const badgeColor = v => v === true || v === 'pass' ? 'var(--safe)' : v === false || v === 'fail' ? 'var(--danger)' : 'var(--warn)';
            $('modal-badges').innerHTML = ['factual', 'completeness', 'risk'].map(k => {
                const v = crit[k];
                return v !== undefined ? `<span class="critique-badge">
                    <span class="cb-dot" style="background:${badgeColor(v)}"></span>${k}</span>` : '';
            }).join('');

            // Collapsible sections
            const explanation = fn.explanation || fn.verified_explanation || '';
            const sections = [
                { title: 'Purpose', body: fn.purpose || _extractSection(explanation, 'Purpose') || 'N/A' },
                { title: 'Parameters', body: fn.params || _extractSection(explanation, 'Parameters') || 'N/A' },
                { title: 'Returns', body: fn.returns || _extractSection(explanation, 'Returns') || 'N/A' },
                { title: 'Side Effects', body: fn.side_effects || _extractSection(explanation, 'Side Effects') || 'N/A' },
                { title: 'Risks', body: fn.risks || _extractSection(explanation, 'Risks') || 'N/A' },
                { title: 'CodeBalance', body: `Energy: ${e}/10 · Debt: ${d}/10 · Safety: ${s}/10` },
                { title: 'Full Explanation', body: explanation || 'No explanation available.' },
            ];
            $('modal-sections').innerHTML = sections.map(sec => `
                <div class="modal-section">
                    <div class="modal-section-title" onclick="this.querySelector('.chevron').classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">
                        <span class="chevron">▼</span> ${sec.title}
                    </div>
                    <div class="modal-section-body">${_escapeHtml(sec.body)}</div>
                </div>`).join('');

            modal.classList.add('active');
        }

        function _extractSection(text, heading) {
            const re = new RegExp(`(?:^|\\n)\\*?\\*?${heading}[:\\*]*\\s*\\n?([\\s\\S]*?)(?=\\n\\*?\\*?[A-Z][a-z]+[:\\*]|$)`, 'i');
            const m = text.match(re);
            return m ? m[1].trim() : '';
        }
        function _escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        $('modal-close-btn').addEventListener('click', () => $('explain-modal').classList.remove('active'));
        $('explain-modal').addEventListener('click', e => {
            if (e.target === $('explain-modal')) $('explain-modal').classList.remove('active');
        });

        // ── Global init (nav meta) ────────────────────────
        async function initNav() {
            try {
                const [summary, repoInfo] = await Promise.all([
                    api('/api/summary'), api('/api/repo_root'),
                ]);
                $('nav-analysis-date').textContent = 'Analysed: ' + (summary.analysed_at || '');
                if (repoInfo.root) {
                    const parts = repoInfo.root.split('/');
                    $('nav-repo-label').innerHTML = `<strong>📂 ${parts[parts.length - 1]}</strong>`;
                }
                $('footer-date').textContent = new Date().getFullYear();
            } catch { }
        }

        // Expose for child pages to call after their init
        window.LegacyLens = { openExplainModal, loadAllFunctions, initNav, api, $, pillColor, scoreColor };
    </script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
