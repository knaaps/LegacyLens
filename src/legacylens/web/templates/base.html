<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LegacyLens{% endblock %}</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Dark Theme Palette */
            --bg-base: #0a0a0c;
            --bg-surface: rgba(22, 22, 26, 0.6);
            --bg-surface-hover: rgba(35, 35, 41, 0.8);
            --bg-glass: rgba(18, 18, 22, 0.7);
            
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(99, 102, 241, 0.5);
            
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            
            /* Accents */
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            
            /* Status Colors */
            --danger: #ef4444;
            --warn: #f59e0b;
            --success: #10b981;
            --info: #3b82f6;

            --pill-green: rgba(16, 185, 129, 0.15);
            --pill-green-text: #34d399;
            --pill-yellow: rgba(245, 158, 11, 0.15);
            --pill-yellow-text: #fbbf24;
            --pill-red: rgba(239, 68, 68, 0.15);
            --pill-red-text: #f87171;
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px var(--accent-glow);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient glowing orbs in background */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.15);
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(168, 85, 247, 0.1);
            bottom: -150px;
            right: -100px;
            animation: float 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo-container {
            padding: 32px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--accent-primary);
            transform: scaleY(0);
            transition: transform 0.2s ease;
            transform-origin: center;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        .nav-item.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(99,102,241,0.1) 0%, rgba(99,102,241,0) 100%);
        }

        .nav-item.active::before {
            transform: scaleY(1);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            stroke-width: 2;
            transition: stroke 0.2s ease;
        }

        .nav-item.active svg {
            stroke: var(--accent-primary);
        }

        /* Main Content Area */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px 60px;
            position: relative;
            z-index: 10;
            max-width: 1600px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-glass);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        /* Buttons Loading & Error States */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-base);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .error-banner {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        /* Utility Classes */
        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-base);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 40px rgba(99,102,241,0.1);
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        
        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(10,10,12,0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        
        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .modal-body {
            padding: 32px;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div id="loading">
        <div class="spinner"></div>
        <div style="color: var(--text-secondary); font-size: 14px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;">Initializing System...</div>
    </div>

    <nav class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"></path>
                    <path d="M9 18h6"></path>
                    <path d="M10 22h4"></path>
                </svg>
            </div>
            <div class="logo-text">LegacyLens</div>
        </div>
        
        <div class="nav-menu">
            <a href="/" class="nav-item id-nav-dashboard {% block nav_dashboard %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </a>
            <a href="/executive" class="nav-item id-nav-exec {% block nav_executive %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                Executive Summary
            </a>
            <a href="/functions" class="nav-item id-nav-funcs {% block nav_functions %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                Function Catalog
            </a>
            <a href="/heatmap" class="nav-item id-nav-heatmap {% block nav_heatmap %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Risk Heatmap
            </a>
            <a href="/search" class="nav-item id-nav-search {% block nav_search %}{% endblock %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Global Search
            </a>
        </div>
    </nav>

    <main class="main-content" id="app-root" style="display: none;">
        <div id="error-banner" class="error-banner"></div>
        {% block content %}{% endblock %}
    </main>

    <!-- Global Explain Modal -->
    <div class="modal-overlay" id="global-explain-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="gem-title">Function Details</div>
                <button class="modal-close" onclick="window.LegacyLens.closeExplainModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body" id="gem-body">
                Loading documentation...
            </div>
        </div>
    </div>

    <!-- Core App Logic -->
    <script>
        window.LegacyLens = (() => {
            const state = {
                functions: null,
                summary: null
            };

            const api = async (endpoint) => {
                const res = await fetch(endpoint);
                if (!res.ok) throw new Error(`API Error: ${res.statusText}`);
                return res.json();
            };

            const loadAllFunctions = async () => {
                if (!state.functions) {
                    state.functions = await api('/api/functions');
                }
                return state.functions;
            };

            const scoreColor = (score) => {
                if (score <= 3) return 'var(--success)';
                if (score <= 6) return 'var(--warn)';
                return 'var(--danger)';
            };

            const pillColor = (score) => {
                if (score <= 3) return 'pill-green';
                if (score <= 6) return 'pill-yellow';
                return 'pill-red';
            };

            const $ = id => document.getElementById(id);

            const _extractSection = (text, heading) => {
                if (!text) return '';
                const re = new RegExp(`(?:^|\\n)\\*?\\*?${heading}[:\\*]*\\s*\\n?([\\s\\S]*?)(?=\\n\\*?\\*?[A-Z][a-z]+[:\\*]|$)`, 'i');
                const m = text.match(re);
                return m ? m[1].trim() : '';
            };

            const _escapeHtml = (str) => {
                return (str||'').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\\n/g, '<br>');
            };

            const openExplainModal = async (funcName) => {
                const modal = $('global-explain-modal');
                const title = $('gem-title');
                const body = $('gem-body');
                
                title.textContent = funcName;
                body.innerHTML = `
                    <div style="display:flex; justify-content:center; padding: 40px;">
                        <div class="spinner"></div>
                    </div>`;
                modal.classList.add('active');

                try {
                    const data = await api(`/api/explain/${encodeURIComponent(funcName)}`);
                    
                    const e = data.energy ?? 0, d = data.debt ?? 0, s = data.safety ?? 0;
                    const exp = data.verified_explanation || data.explanation || '';
                    
                    const sections = [
                        { t: 'Purpose', b: _extractSection(exp, 'Purpose') },
                        { t: 'Parameters', b: _extractSection(exp, 'Parameters') },
                        { t: 'Returns', b: _extractSection(exp, 'Returns') },
                        { t: 'Side Effects', b: _extractSection(exp, 'Side Effects') },
                        { t: 'Risks', b: _extractSection(exp, 'Risks') }
                    ];

                    const renderScore = (label, val) => `
                        <div style="background:var(--surface2); padding: 16px; border-radius: var(--radius-md); text-align: center; border: 1px solid var(--border-light);">
                            <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px;">${label}</div>
                            <div style="font-size: 24px; font-weight: 800; color: ${scoreColor(val)}">${val}/10</div>
                        </div>
                    `;

                    body.innerHTML = `
                        <div style="font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--text-secondary); margin-bottom:24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-light);">
                            ${data.file}
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px;">
                            ${renderScore('Cognitive Energy', e)}
                            ${renderScore('Technical Debt', d)}
                            ${renderScore('Safety Risk', s)}
                        </div>
                        
                        <div style="display: flex; flex-direction: column; gap: 24px;">
                            ${sections.filter(s => s.b).map(sec => `
                                <div>
                                    <h4 style="font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-primary); margin-bottom: 8px;">${sec.t}</h4>
                                    <div style="color: var(--text-primary); font-size: 14.5px; opacity: 0.9; line-height: 1.7;">
                                        ${_escapeHtml(sec.b)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } catch (err) {
                    body.innerHTML = `<div style="color:var(--danger); padding:20px;">Failed to load documentation: ${err.message}</div>`;
                }
            };

            const closeExplainModal = () => {
                $('global-explain-modal').classList.remove('active');
            };

            // Close modal on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeExplainModal();
            });
            // Close modal on overlay click
            $('global-explain-modal').addEventListener('click', (e) => {
                if (e.target === $('global-explain-modal')) closeExplainModal();
            });

            // Hide loader and show app-root smoothly on load
            document.addEventListener('DOMContentLoaded', () => {
                const loader = $('loading');
                const root = $('app-root');
                if (loader && root) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        loader.style.transition = 'opacity 0.3s ease';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            root.style.display = 'block';
                        }, 300);
                    }, 100);
                }
            });

            return {
                api,
                loadAllFunctions,
                scoreColor,
                pillColor,
                openExplainModal,
                closeExplainModal,
                $,
                initNav: () => { /* No longer strictly needed if we manage active classes in jinja blocks, but we keep it to not break scripts */ }
            };
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
